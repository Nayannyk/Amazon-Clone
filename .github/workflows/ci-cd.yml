name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/amazon-clone
  CLUSTER_NAME: amazon-clone-cluster
  NAMESPACE: amazon-clone

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform
    outputs:
      ec2_host: ${{ steps.outputs.outputs.ec2_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          echo "=== Verifying AWS credentials ==="
          sts=$(aws sts get-caller-identity)
          echo "$sts"
          ACCOUNT=$(echo $sts | jq -r '.Account')
          if [ -z "$ACCOUNT" ]; then
            echo "ERROR: AWS credentials are invalid!"
            exit 1
          fi
          echo "AWS Account: $ACCOUNT - Credentials OK"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Save SSH key
        run: terraform output -raw ssh_private_key > ../generated-key.pem

      - name: Upload SSH key
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key
          path: generated-key.pem
          retention-days: 1

      - name: Get outputs
        id: outputs
        run: |
          echo "ec2_host=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: always() && needs.terraform.result == 'success' && needs.build.result == 'success'
    steps:
      - name: Download SSH key
        uses: actions/download-artifact@v4
        with:
          name: ssh-key

      - name: Set key permissions
        run: chmod 600 generated-key.pem

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.terraform.outputs.ec2_host }}
          username: ubuntu
          key_path: generated-key.pem
          script: |
            set -e

            echo "=== Configuring AWS on EC2 ==="
            mkdir -p ~/.aws
            cat > ~/.aws/credentials <<EOF
            [default]
            aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            EOF
            cat > ~/.aws/config <<EOF
            [default]
            region = ${{ secrets.AWS_REGION }}
            output = json
            EOF

            echo "=== Pulling latest code ==="
            cd /home/ubuntu/amazon-clone
            git pull origin main

            echo "=== Pulling new Docker image ==="
            docker pull ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

            echo "=== Loading image into Kind cluster ==="
            kind load docker-image ${{ env.DOCKER_IMAGE }}:${{ github.sha }} --name ${{ env.CLUSTER_NAME }}

            echo "=== Updating deployment image ==="
            cd kubernetes
            sed -i "s|image: .*|image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}|" deployment.yaml

            echo "=== Applying Kubernetes manifests ==="
            kubectl apply -f namespace.yaml
            kubectl apply -f deployment.yaml -n ${{ env.NAMESPACE }}
            kubectl apply -f service.yaml -n ${{ env.NAMESPACE }}
            kubectl apply -f ingress.yaml -n ${{ env.NAMESPACE }}

            echo "=== Waiting for rollout to complete ==="
            kubectl rollout status deployment/shopeasy -n ${{ env.NAMESPACE }} --timeout=120s

            echo "=== Deployment successful ==="
            kubectl get pods -n ${{ env.NAMESPACE }} -o wide

      - name: Verify deployment
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.terraform.outputs.ec2_host }}
          username: ubuntu
          key_path: generated-key.pem
          script: |
            echo "=== Running health check ==="
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/ > /dev/null; then
                echo "Site is UP (attempt $i)"
                break
              fi
              echo "Waiting for site... (attempt $i)"
              sleep 5
            done
            echo ""
            echo "=== Ingress status ==="
            kubectl get ingress -n ${{ env.NAMESPACE }}
            echo ""
            echo "=== Pods status ==="
            kubectl get pods -n ${{ env.NAMESPACE }} -o wide
